name: Shwari High Speed Sync
on:
  workflow_dispatch: # This adds the manual button

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install -r requirements.txt

      - name: Execute Sync
        env:
          GCP_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python main.py
