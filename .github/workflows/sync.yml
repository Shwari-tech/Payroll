name: Shwari Sync
on:
  repository_dispatch:
    types: [manual_sync]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run
        env:
          GCP_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python main.py
