<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shwari Finance | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.4/otpauth.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ms-blue: #0078d4; --ms-gray: #f3f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--ms-gray); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; color: #323130; }
        .otp-input { width: 100%; padding: 12px; font-size: 1.5rem; text-align: center; letter-spacing: 5px; margin: 20px 0; border: 1.5px solid #8a8886; }
        .sync-btn { background: var(--ms-blue); color: white; border: none; padding: 16px; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; display: none; }
        #status { margin-top: 15px; font-size: 0.85rem; display: none; padding: 10px; border-radius: 4px; }
        .success { background: #dff6dd; color: #107c10; }
    </style>
</head>
<body>
    <div class="card" id="auth-box">
        <h1>Verify Identity</h1>
        <p>Enter code from Google Authenticator</p>
        <input type="tel" id="otp" class="otp-input" placeholder="000000" maxlength="6">
    </div>

    <div class="card" id="dash-box" style="display:none;">
        <h1>Shwari Dashboard</h1>
        <p>System active on GitHub high-speed servers.</p>
        <button class="sync-btn" id="sync-btn" style="display:block;" onclick="triggerSync()">RUN HIGH-SPEED SYNC</button>
        <div id="status"></div>
    </div>

    <script>
        const SECRET = "HXDMVJECJJWSRB3HWIZR4IFUGFTMXBOZ";
        const otpInput = document.getElementById('otp');

        otpInput.addEventListener('input', () => {
            if (otpInput.value.length === 6) {
                const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(SECRET) });
                if (totp.validate({ token: otpInput.value }) !== null) {
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('dash-box').style.display = 'block';
                } else { otpInput.value = ''; }
            }
        });

        async function triggerSync() {
            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            btn.innerText = "INITIALIZING...";

            const res = await fetch(`https://api.github.com/repos/Shwari-tech/Payroll/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `token YOUR_NEW_TOKEN_HERE`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ event_type: 'manual_sync' })
            });

            if (res.status === 204) {
                status.className = 'success';
                status.innerHTML = "✅ Sync Started! Check GitHub Actions tab.";
                status.style.display = 'block';
            }
        }
    </script>
</body>
</html>
